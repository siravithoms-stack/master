    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],

                    colors: {
                        poe: {
                            dark: '#1a1a1a',

                    backgroundImage: {
                        'stone-pattern': "url('https://www.transparenttextures.com/patterns/black-scales.png')", // Fallback texture
                    }
                }
            }
        }

    <style>
        body {
            background-color: #0f0f11;
            background-image: radial-gradient(circle at 50% 0%, #2a2a35 0%, #0f0f11 60%);
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .poe-border {
            border: 2px solid #5c5c5c;
            box-shadow: 0 0 10px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .poe-border::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 1px solid rgba(224, 192, 128, 0.3);
            pointer-events: none;
        }

        .service-card {
            background: linear-gradient(180deg, #2a2a35 0%, #1a1a24 100%);
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.9), 0 0 15px rgba(224, 192, 128, 0.2);
            border-color: #8c7a56;
        }

        .title-plate {
            background: linear-gradient(90deg, transparent 0%, rgba(42,42,53,0.8) 20%, rgba(42,42,53,0.8) 80%, transparent 100%);
            border-top: 1px solid #5c5c5c;
            border-bottom: 1px solid #5c5c5c;
        }

        /* Editor Modal Styles */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
        }

        .editable-field {
            cursor: pointer;
            position: relative;
            border: 1px dashed transparent;
            transition: border-color 0.2s;
        }

        .editable-field:hover {
            border-color: #f0b543;
            background-color: rgba(240, 181, 67, 0.1);
        }

        .editable-field::after {
            content: '\f040'; /* FontAwesome edit icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: -10px;
            right: -10px;
            background: #f0b543;
            color: #1a1a1a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .editable-field:hover::after {
            opacity: 1;
        }

        .edit-mode-active .editable-field {
            border-color: #5c5c5c;
        }

        textarea.editor-input {
            width: 100%;
            min-height: 150px;
            background-color: #1a1a1a;
            color: #d4d4d4;
            border: 1px solid #5c5c5c;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Kanit', sans-serif;
            resize: vertical;
        }

        textarea.editor-input:focus {
            outline: none;
            border-color: #f0b543;
        }
    </style>
</head>
<body class="bg-stone-pattern">

    </div>

    <!-- Detail View Modal -->

    <!-- Edit Modal (HTML Editor) -->

    <script>
        // Default data structure - Updated with detailed views
        const defaultData = {
            mainTitle: 'บริการรับจ้าง (POE 2 SERVICES)',
            
            // Preview Data (shown on main grid)
            title1: '<h3 class="text-xl md:text-2xl font-bold text-poe-gold">1. รับวิ่ง Act 1 - 4<br>& Interlude 1-3</h3>',
            desc1: '<ul class="list-none space-y-2">\n    <li>- เลเวล 60+</li>\n    <li>- พลังวิญญาณ 100</li>\n    <li>- เก็บครบหมดทุกเควส</li>\n</ul>',
            
            title2: '<h3 class="text-xl md:text-2xl font-bold text-blue-400">2. รับปลดแต้ม 1-8</h3>',
            desc2: '<div class="text-center text-gray-400">\n    <div class="w-32 h-40 bg-gray-800 border-2 border-blue-500/50 rounded shadow-[0_0_15px_rgba(59,130,246,0.3)] mx-auto flex items-center justify-center transform rotate-6 hover:rotate-0 transition-transform mb-4">\n        <i class="fas fa-book-journal-whills text-4xl text-blue-400"></i>\n    </div>\n    <ul class="text-left text-gray-300 space-y-2 mt-4 text-sm">\n        <li></li>\n    </ul>\n</div>',
            
            title3: '<h3 class="text-xl md:text-2xl font-bold text-poe-red">3. รับจัดบิ้ว<br>ตามงบราคา</h3>',
            desc3: '<div class="flex justify-center gap-6 mb-4">\n    <div class="text-poe-gold text-5xl drop-shadow-md">\n        <i class="fas fa-coins"></i>\n    </div>\n    <div class="text-gray-400 text-5xl drop-shadow-md border-2 border-gray-500 rounded-lg p-2 bg-gray-800/50">\n        <i class="fas fa-cogs"></i>\n    </div>\n</div>\n<ul class="text-left text-gray-300 space-y-2 mt-4 text-sm">\n    <li></li>\n</ul>',
            
            // Detailed View Data (Shown in Modal)
            detailTitle1: '<h2 class="text-3xl font-bold text-poe-gold">รายละเอียดบริการ: วิ่ง Act 1 - 4 & Interlude</h2>',
            detailContent1: '<div class="space-y-4 text-lg text-gray-300">\n  <p><b class="text-poe-gold">รายละเอียดที่ท่านจะได้รับ:</b></p>\n  <ul class="list-disc pl-6 space-y-2">\n    <li>ตัวละครเลเวล 60 ขึ้นไป การันตี</li>\n    <li>พลังวิญญาณ (Spirit) 100 หน่วยเต็ม</li>\n    <li>ทำเควสเนื้อเรื่อง (Campaign) ครบทุก Act (1-4) และ Interlude (1-3)</li>\n    <li>ปลดล็อค Waypoint สำคัญครบถ้วน</li>\n    <li>ของดรอประหว่างทาง มอบคืนให้ลูกค้าทั้งหมด (ยกเว้นขยะ)</li>\n  </ul>\n  <br>\n  <p><b class="text-poe-gold">ระยะเวลาดำเนินการ:</b> ประมาณ 2-4 ชั่วโมง (ขึ้นอยู่กับคิว)</p>\n  <p><b class="text-poe-gold">สิ่งที่ต้องเตรียม:</b></p>\n  <ul class="list-disc pl-6 space-y-2">\n    <li>ไอดีและพาสเวิร์ด (รับประกันความปลอดภัย 100%)</li>\n    <li>ไม่ต้องเตรียมของสวมใส่ เราจัดการให้</li>\n  </ul>\n</div>',

            detailTitle2: '<h2 class="text-3xl font-bold text-blue-400">รายละเอียดบริการ: ปลดแต้ม Skill Points 1-8</h2>',
            detailContent2: '<div class="space-y-4 text-lg text-gray-300">\n  <div class="flex justify-center mb-6">\n    <i class="fas fa-book-journal-whills text-6xl text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.6)]"></i>\n  </div>\n  <p><b class="text-blue-400">รายละเอียดการปลดแต้ม:</b></p>\n  <p>บริการวิ่งเคลียร์เควสรอง (Side Quests) ที่ให้รางวัลเป็น Passive Skill Points เพื่อให้ตัวละครของท่านแข็งแกร่งที่สุดในระดับเลเวลนั้นๆ</p>\n  <ul class="list-disc pl-6 space-y-2 mt-4">\n    <li>รับประกันได้ครบทั้ง 8 แต้ม (หรือตามที่ขาด)</li>\n    <li>ใช้เวลาไม่นาน รวดเร็ว ปลอดภัย</li>\n    <li>ไม่ต้องให้รหัสผ่าน สามารถปาร์ตี้เดินตามได้ (หรือให้เราล็อกอินเล่นให้ก็ได้)</li>\n  </ul>\n  <br>\n  <p><b class="text-blue-400">เงื่อนไข:</b> ตัวละครต้องผ่าน Act ที่กำหนดของแต่ละเควสแล้ว</p>\n</div>',

            detailTitle3: '<h2 class="text-3xl font-bold text-poe-red">รายละเอียดบริการ: จัดบิ้วตามงบประมาณ</h2>',
            detailContent3: '<div class="space-y-4 text-lg text-gray-300">\n  <p><b class="text-poe-red">เปลี่ยนตัวละครของคุณให้เทพ ในงบที่คุณกำหนดได้!</b></p>\n  <p>ไม่ว่าคุณอยากจะเล่นสายอะไร ตีใกล้, เวทมนตร์, ซัมมอน หรือสายฟาร์มไว เราพร้อมให้คำปรึกษาและจัดหาไอเทมให้ตรงตามความต้องการ</p>\n  <br>\n  <ul class="list-disc pl-6 space-y-3">\n    <li><b class="text-poe-gold">ให้คำปรึกษาฟรี:</b> พูดคุยสไตล์การเล่นที่ชอบ เพื่อหาบิ้วที่ใช่</li>\n    <li><b class="text-poe-gold">จัดหาไอเทม:</b> เราหาซื้อของสวมใส่ (Gear), อาวุธ, เพชร (Gems) ให้ครบเซ็ต</li>\n    <li><b class="text-poe-gold">เซ็ตอัพตัวละคร:</b> อัพ Passive Tree และตั้งค่าสกิลให้พร้อมลุยทันที</li>\n    <li><b class="text-poe-gold">รับประกันความพึงพอใจ:</b> สอนคอมโบพื้นฐานและการเอาตัวรอดของบิ้วนั้นๆ</li>\n  </ul>\n  <br>\n  <div class="bg-gray-800 p-4 border border-gray-600 rounded text-center">\n      <p>เริ่มต้นเพียง <b>10 Divine Orbs</b> ก็สามารถฟาร์มสบายๆ ได้แล้ว!</p>\n  </div>\n</div>',

            merchantId: '5050'
        };

        // Current application state
        let siteData = {};
        let isEditMode = false;
        let currentActiveDetailId = null; // Keeps track of which detail view is open

        // Initialize application
        function init() {
            loadData();
            renderAll();
            updateEditModeUI();
        }

        // Load data from LocalStorage or use defaults
        function loadData() {
            const saved = localStorage.getItem('poeServiceDataV2');
            if (saved) {
                try {
                    siteData = JSON.parse(saved);
                    // Merge with default in case new fields were added
                    siteData = { ...defaultData, ...siteData }; 
                } catch (e) {
                    console.error("Error parsing saved data", e);
                    siteData = { ...defaultData };
                }
            } else {
                siteData = { ...defaultData };
            }
        }

        // Save data to LocalStorage
        function saveData() {
            localStorage.setItem('poeServiceDataV2', JSON.stringify(siteData));
        }

        // Render all fields to the DOM
        function renderAll() {
            // Render Main Title
            if(document.getElementById('mainTitle-display')) {
                document.getElementById('mainTitle-display').innerHTML = siteData.mainTitle;
            }

            // Render Preview Cards (Syncing data to previews)
            for(let i=1; i<=3; i++) {
                if(document.getElementById(`title${i}-preview`)) {
                    document.getElementById(`title${i}-preview`).innerHTML = siteData[`title${i}`];
                }
                if(document.getElementById(`desc${i}-preview`)) {
                    document.getElementById(`desc${i}-preview`).innerHTML = siteData[`desc${i}`];
                }
            }

            // Render Merchant ID
            if(document.getElementById('merchantId-display')) {
                document.getElementById('merchantId-display').innerHTML = siteData.merchantId;
            }

            // If detail view is open, re-render it
            if(currentActiveDetailId !== null) {
                document.getElementById('detailTitle-display').innerHTML = siteData[`detailTitle${currentActiveDetailId}`];
                document.getElementById('detailContent-display').innerHTML = siteData[`detailContent${currentActiveDetailId}`];
            }
        }

        // Toggle Edit/View Mode
        function toggleEditMode() {
            isEditMode = !isEditMode;
            updateEditModeUI();
        }

        function updateEditModeUI() {
            const btn = document.getElementById('toggleEditBtn');
            const body = document.body;
            
            if (isEditMode) {
                btn.innerHTML = '<i class="fas fa-unlock text-poe-gold"></i><span class="text-poe-gold">โหมดแก้ไข (เปิดใช้งานอยู่)</span>';
                btn.classList.add('border-poe-gold');
                body.classList.add('edit-mode-active');
                
                // Show edit hints in detail view
                const hint = document.getElementById('detailEditHint');
                if(hint) hint.innerHTML = "<span class='text-poe-gold'>[โหมดแก้ไข] คลิกที่ข้อความด้านบนเพื่อแก้ไขรายละเอียด</span>";
                
            } else {
                btn.innerHTML = '<i class="fas fa-lock"></i><span>โหมดผู้ชมทั่วไป</span>';
                btn.classList.remove('border-poe-gold');
                body.classList.remove('edit-mode-active');
                
                // Reset edit hints
                const hint = document.getElementById('detailEditHint');
                if(hint) hint.innerHTML = "หากต้องการติดต่อ กรุณาแจ้งรหัสพ่อค้าด้านล่าง";
            }
        }

        // --- Detail View Logic ---

        function openDetailView(id) {
            // If in edit mode, prevent opening detail view from the main cards so user doesn't accidentally click. 
            // Actually, we want them to click to open detail, then edit inside detail.
            // But we also need them to be able to edit the *preview* text. 
            // Let's make it so clicking opens the detail view in BOTH modes.
            
            currentActiveDetailId = id;
            
            // Set dynamic colors based on ID
            const colorLine = document.getElementById('detailColorLine');
            if(id === 1) { colorLine.className = "absolute top-0 left-0 right-0 h-1 bg-poe-gold shadow-[0_0_15px_#f0b543]"; }
            else if(id === 2) { colorLine.className = "absolute top-0 left-0 right-0 h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]"; }
            else if(id === 3) { colorLine.className = "absolute top-0 left-0 right-0 h-1 bg-poe-red shadow-[0_0_15px_#e24a4a]"; }

            // Render content for specific ID
            document.getElementById('detailTitle-display').innerHTML = siteData[`detailTitle${id}`];
            document.getElementById('detailContent-display').innerHTML = siteData[`detailContent${id}`];

            // Show Modal
            const modal = document.getElementById('detailModal');
            modal.classList.remove('hidden');
            // Small timeout to allow display block to apply before changing opacity for transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
            }, 10);
        }

        function closeDetailView() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('opacity-0');
            
            // Wait for transition before hiding
            setTimeout(() => {
                modal.classList.add('hidden');
                currentActiveDetailId = null;
            }, 300);
        }

        // --- Editor Logic ---

        function openEditor(keyContext) {
            if (!isEditMode) return; // Only open if in edit mode
            
            // Prevent event bubbling if clicking inside a card that also opens detail view
            if(event) event.stopPropagation(); 

            let actualKey = keyContext;
            
            // Map context to actual data keys if we are inside a detail view
            if (keyContext === 'detailTitle' && currentActiveDetailId !== null) {
                actualKey = `detailTitle${currentActiveDetailId}`;
            } else if (keyContext === 'detailContent' && currentActiveDetailId !== null) {
                actualKey = `detailContent${currentActiveDetailId}`;
            }
            
            // We can also allow editing the preview cards directly if needed, but for now we focus on detail view and main titles
            // To allow editing preview texts, we would add editable-field class to them and map them here.

            const modal = document.getElementById('editModal');
            const textarea = document.getElementById('editorTextarea');
            const keyInput = document.getElementById('currentEditKey');
            const modalTitle = document.getElementById('modalTitle');

            // Set titles based on what we are editing
            let titleText = '<i class="fas fa-edit text-sm"></i> แก้ไขข้อมูล';
            if(actualKey === 'mainTitle') titleText = "แก้ไขหัวข้อหลัก";
            else if(actualKey.includes('detailTitle')) titleText = `แก้ไขหัวข้อย่อยบริการที่ ${currentActiveDetailId}`;
            else if(actualKey.includes('detailContent')) titleText = `แก้ไขรายละเอียดเชิงลึกบริการที่ ${currentActiveDetailId}`;
            else if(actualKey === 'merchantId') titleText = "แก้ไขรหัสพ่อค้า";
            else titleText = `แก้ไข: ${actualKey}`;
            
            modalTitle.innerHTML = titleText;

            textarea.value = siteData[actualKey] || '';
            keyInput.value = actualKey;

            // Make sure detail modal is visually below edit modal
            if(currentActiveDetailId !== null) {
                 document.getElementById('detailModal').style.zIndex = '50';
            }

            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            textarea.focus();
        }

        function closeEditor() {
            const modal = document.getElementById('editModal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                // Restore z-index of detail modal
                if(currentActiveDetailId !== null) {
                     document.getElementById('detailModal').style.zIndex = '60';
                }
            }, 300);
        }

        function saveEdit() {
            const key = document.getElementById('currentEditKey').value;
            const content = document.getElementById('editorTextarea').value;
            
            if (key) {
                siteData[key] = content;
                saveData();
                renderAll();
                closeEditor();
                
                // Show a brief success indicator on the edited element
                let displayElId = `${key}-display`;
                
                // Handle dynamic IDs for detail view
                if(key.includes('detailTitle')) displayElId = 'detailTitle-display';
                if(key.includes('detailContent')) displayElId = 'detailContent-display';
                
                const displayEl = document.getElementById(displayElId);
                if(displayEl) {
                    displayEl.classList.add('bg-green-900/50', 'transition-colors', 'duration-300');
                    setTimeout(() => {
                        displayEl.classList.remove('bg-green-900/50');
                    }, 800);
                }
            }
        }

        // Helper for HTML editor buttons
        function insertTag(openTag, closeTag) {
            const textarea = document.getElementById('editorTextarea');
            const startPos = textarea.selectionStart;
            const endPos = textarea.selectionEnd;
            const selectedText = textarea.value.substring(startPos, endPos);
            
            const replacement = openTag + selectedText + closeTag;
            textarea.value = textarea.value.substring(0, startPos) + replacement + textarea.value.substring(endPos);
            
            // Reset cursor
            textarea.focus();
            if(selectedText.length === 0 && closeTag.length > 0) {
                 // Place cursor inside empty tags
                textarea.selectionStart = startPos + openTag.length;
                textarea.selectionEnd = startPos + openTag.length;
            } else {
                 // Place cursor after inserted tags
                 textarea.selectionStart = startPos + replacement.length;
                 textarea.selectionEnd = startPos + replacement.length;
            }
        }

        // Close modals when clicking outside
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditor();
        });
        
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this && !isEditMode) closeDetailView();
            // In edit mode, clicking outside shouldn't close detail view easily to prevent accidents while editing
            if (e.target === this && isEditMode) {
                 if(confirm('ต้องการปิดหน้าต่างรายละเอียดหรือไม่? (ข้อมูลที่ยังไม่บันทึกจะหายไป)')) {
                     closeDetailView();
                 }
            }
        });

        // Run on load
        window.onload = init;
    </script>
</body>
</html>
